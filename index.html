<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Criação de Constelações</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div id="notificacao-sistema"></div>

    <div id="sistema-modal-overlay">
        <div id="sistema-modal">
            <div id="modal-titulo">Aviso</div>
            <p id="modal-mensagem"></p>
            <input type="text" id="modal-input" autocomplete="off">
            <div class="modal-botoes">
                <button id="modal-btn-cancelar" class="btn-secundario">Cancelar</button>
                <button id="modal-btn-confirmar" class="btn-primario">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- SWITCHER DE MODO -->
    <div id="mode-switcher">
        <button id="mode-create" class="active" onclick="setMode('create')">Criação</button>
        <button id="mode-library" onclick="setMode('library')">Biblioteca</button>
    </div>

    <div id="controls-panel">
        <div id="onboarding-msg">Clica nas estrelas para traçar o esqueleto</div>
        <div id="hud">Estrelas Unidas: <span id="star-count">0</span></div>
        <div class="action-buttons">
            <button id="forge-btn" onclick="onForgeConstellation()">Gerar Mito</button>
            <div class="secondary-buttons">
                <button id="undo-btn" onclick="onUndo()" disabled>Desfazer</button>
                <button id="clear-btn" onclick="onClearSky()">Limpar</button>
            </div>
        </div>
        <div class="zoom-container">
            <div class="zoom-label">
                <span>Lente Lume</span>
                <span id="zoom-val">100%</span>
            </div>
            <input type="range" id="zoom-slider" min="0.1" max="8.0" step="0.05" value="0.1">
        </div>
    </div>
    
    <div id="tooltip"></div>
    
    <div id="interface-myth">
        <div id="myth-loading">
            <div class="spinner"></div>
            <p id="loading-text"></p>
        </div>
        
        <div id="scroll-container" class="pergaminho-scroll-zone">
            <div class="rolo-topo" id="mesh-rolo-topo"></div>
            
            <div class="pergaminho-corpo" id="mesh-papiro-corpo">
                <button id="close-myth-btn" onclick="closeMythSidebar()">&times;</button>
                
                <div id="myth-content" style="display: none;">
                    <div id="myth-badge"></div>
                    <h2 id="myth-title"></h2>
                    
                    <div class="conteudo-ocultavel" id="bloco-lenda">
                        <div id="myth-text"></div>
                        <div id="myth-metadata"></div>
                    </div>
                </div>
            </div>
            
            <div class="area-base-mecanica">
                <div id="puxador-aviso" onclick="desenrolarPergaminho()">Puxar para ler mito ↓</div>
                <div class="rolo-base" id="mesh-rolo-base" onclick="desenrolarPergaminho()"></div>
            </div>
        </div>
    </div>
    
    <div id="compass">
        <div id="compass-label">Polaris</div>
        <div id="compass-needle"></div>
    </div>

    <!-- BOTÕES FLUTUANTES BASE -->
    <button id="save-btn-floating" class="floating-bottom-btn" onclick="onSaveConstellation()" style="display: none;">GUARDAR CONSTELAÇÃO</button>
    <button id="delete-btn-floating" class="floating-bottom-btn" onclick="onDeleteCurrentConstellation()" style="display: none;">APAGAR CONSTELAÇÃO</button>

    <script>
        window.addEventListener('libraryUpdated', () => { 
            if (typeof window.renderLibrary === 'function') window.renderLibrary(); 
        });
    </script>

    <script async src="https://cdnjs.cloudflare.com/ajax/libs/es-module-shims/1.6.3/es-module-shims.js"></script>
    <script type="importmap"> { "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js", "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/" } } </script>
    <script type="module" src="static/js/constellation.js"></script>
</body>
</html>
