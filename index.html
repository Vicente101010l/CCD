<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Criação de Constelações</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Abel', sans-serif; 
        }
        canvas { display: block; cursor: crosshair; }
        
        /* Custom scrollbar for modern browsers */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(10, 10, 15, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(201, 168, 76, 0.3);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(201, 168, 76, 0.6);
        }
        
        #controls-panel {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 8px;
            border: 1px solid rgba(168, 196, 224, 0.2);
            color: #c9a84c;
            z-index: 5;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            width: 280px;
            box-sizing: border-box;
        }
        
        #hud { 
            font-size: 11px;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }
        
        #forge-btn {
            width: 100%;
            padding: 14px 20px;
            background: #c9a84c; 
            border: none; 
            font-weight: 700; 
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #000;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: 'Abel', sans-serif;
            font-size: 12px;
        }
        #forge-btn:hover { 
            background: #a8c4e0; 
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(168, 196, 224, 0.4);
        }
        #forge-btn:active {
            transform: translateY(0);
        }
        
        /* Zoom slider container styling */
        .zoom-container {
            margin-top: 20px;
            border-top: 1px solid rgba(168, 196, 224, 0.15);
            padding-top: 20px;
        }
        .zoom-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 3px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            border: none;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #c9a84c;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -4.5px;
            box-shadow: 0 0 8px #c9a84c;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #a8c4e0;
            box-shadow: 0 0 10px #a8c4e0;
        }
        
        #interface-myth {
            position: absolute; 
            top: 0; 
            right: 0; 
            width: 460px; 
            height: 100%;
            background: rgba(4, 4, 6, 0.9); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #ffffff; 
            padding: 60px 40px;
            box-sizing: border-box;
            border-left: 1px solid rgba(255, 255, 255, 0.15); 
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
            overflow-y: auto;
            box-shadow: -15px 0 40px rgba(0, 0, 0, 0.85);
            font-family: Georgia, serif;
        }
        #interface-myth.visible { 
            transform: translateX(0); 
        }
        
        #close-myth-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 32px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            line-height: 1;
        }
        #close-myth-btn:hover {
            color: #c9a84c;
            transform: scale(1.1);
        }
        
        #myth-badge {
            align-self: flex-start;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            border-radius: 2px;
            font-family: 'Abel', sans-serif;
        }
        .badge-real {
            background: rgba(168, 196, 224, 0.12);
            color: #a8c4e0;
            border: 1px solid rgba(168, 196, 224, 0.4);
        }
        .badge-custom {
            background: rgba(201, 168, 76, 0.12);
            color: #c9a84c;
            border: 1px solid rgba(201, 168, 76, 0.4);
        }
        
        #myth-title { 
            color: #ffffff; 
            font-family: Georgia, serif;
            font-weight: normal;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5), 0 0 30px rgba(168, 196, 224, 0.35);
            text-transform: none; 
            letter-spacing: normal; 
            margin-top: 5px; 
            font-size: 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.25);
            padding-bottom: 25px;
            margin-bottom: 30px;
        }
        #myth-text {
            font-family: Georgia, serif;
            font-size: 14px;
            line-height: 1.65;
            color: rgba(255, 255, 255, 0.95);
            text-align: left;
            margin: 0;
        }
        #myth-text p {
            margin-top: 0;
            margin-bottom: 20px;
        }
        #myth-metadata {
            font-family: Georgia, serif;
            font-size: 14px;
            line-height: 1.65;
            color: rgba(255, 255, 255, 0.95);
            text-align: left;
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
        }
        #myth-metadata p {
            margin-top: 0;
            margin-bottom: 20px;
        }
        #myth-metadata strong {
            color: #ffffff;
            font-weight: bold;
        }
        #myth-metadata ul {
            padding-left: 20px;
            margin-top: 10px;
            margin-bottom: 20px;
            list-style-type: disc;
        }
        #myth-metadata li {
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.9);
        }
        #myth-metadata li strong {
            color: #ffffff;
        }
        #myth-metadata a {
            color: #a8c4e0;
            text-decoration: underline;
            transition: color 0.2s;
        }
        #myth-metadata a:hover {
            color: #c9a84c;
        }
        
        #tooltip {
            position: absolute;
            display: none;
            background: rgba(5, 5, 8, 0.95);
            color: #a8c4e0;
            padding: 8px 14px;
            border: 1px solid rgba(168, 196, 224, 0.35);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            pointer-events: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
            transform: translate(-50%, -100%);
            margin-top: -15px;
            z-index: 100;
            font-family: 'Abel', sans-serif;
            letter-spacing: 0.5px;
        }
        #myth-loading {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80%;
            color: #a8c4e0;
            text-align: center;
        }
        #myth-loading p {
            font-size: 10px;
            letter-spacing: 1.5px;
            margin-top: 25px;
            line-height: 1.8;
            text-transform: uppercase;
            animation: pulse 1.8s infinite ease-in-out;
            color: #c9a84c;
            font-weight: 600;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 2px solid rgba(168, 196, 224, 0.1);
            border-radius: 50%;
            border-top-color: #c9a84c;
            animation: spin 0.8s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.2);
        }
        #myth-content {
            display: block;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .secondary-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        #save-btn, #clear-btn {
            flex: 1;
            padding: 10px;
            font-size: 10px;
            font-weight: 700;
            border: 1px solid rgba(168, 196, 224, 0.3);
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: inherit;
            transition: all 0.3s;
        }
        #save-btn {
            background: transparent;
            color: #c9a84c;
            border-color: rgba(201, 168, 76, 0.4);
        }
        #save-btn:hover:not(:disabled) {
            background: rgba(201, 168, 76, 0.15);
            box-shadow: 0 0 10px rgba(201, 168, 76, 0.2);
        }
        #save-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            color: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }
        #clear-btn {
            background: transparent;
            color: #ff5555;
            border-color: rgba(255, 85, 85, 0.4);
        }
        #clear-btn:hover {
            background: rgba(255, 85, 85, 0.12);
            box-shadow: 0 0 10px rgba(255, 85, 85, 0.2);
        }
        
        .library-container {
            margin-top: 20px;
            border-top: 1px solid rgba(168, 196, 224, 0.15);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            max-height: 250px;
        }
        .library-header {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 12px;
        }
        #library-list {
            overflow-y: auto;
            max-height: 180px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 5px;
        }
        .library-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            padding: 8px 12px;
            transition: all 0.2s;
        }
        .library-item:hover {
            background: rgba(168, 196, 224, 0.08);
            border-color: rgba(168, 196, 224, 0.2);
        }
        .library-item-name {
            font-size: 11px;
            color: #a8c4e0;
            cursor: pointer;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 170px;
            transition: color 0.2s;
        }
        .library-item-name:hover {
            color: #c9a84c;
        }
        .library-item-delete {
            background: none;
            border: none;
            color: rgba(255, 85, 85, 0.5);
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            line-height: 1;
            padding: 0 4px;
        }
        .library-item-delete:hover {
            color: #ff3333;
            transform: scale(1.2);
        }
        .library-empty {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            font-style: italic;
            text-align: center;
            padding: 15px 0;
        }
    </style>
</head>
<body>
    <div id="controls-panel">
        <div id="hud">MODO: OBSERVAÇÃO/DESENHO<br>ESTRELAS SELECIONADAS: <span id="star-count">0</span></div>
        
        <div class="action-buttons">
            <button id="forge-btn" onclick="onForgeConstellation()">GERAR MITO</button>
            <div class="secondary-buttons">
                <button id="save-btn" onclick="onSaveConstellation()" disabled>GUARDAR</button>
                <button id="clear-btn" onclick="onClearSky()">LIMPAR</button>
            </div>
        </div>

        <div class="zoom-container">
            <div class="zoom-label">
                <span>Zoom Céu</span>
                <span id="zoom-val">100%</span>
            </div>
            <input type="range" id="zoom-slider" min="0.1" max="8.0" step="0.05" value="0.1">
        </div>

        <div class="library-container">
            <div class="library-header">Biblioteca</div>
            <div id="library-list">
                <!-- Constelações guardadas serão listadas aqui -->
            </div>
        </div>
    </div>
    <div id="tooltip"></div>
    <div id="interface-myth">
        <button id="close-myth-btn" onclick="closeMythSidebar()">&times;</button>
        <div id="myth-loading">
            <div class="spinner"></div>
            <p>A consultar os antigos<br>registos estelares...</p>
        </div>
        <div id="myth-content">
            <div id="myth-badge"></div>
            <h2 id="myth-title"></h2>
            <div id="myth-text"></div>
            <div id="myth-metadata"></div>
        </div>
    </div>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.154.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/" } } </script>
    <script type="module" src="static/js/constellation.js"></script>
</body>
</html>
