<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Criação de Constelações</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div id="notificacao-sistema"></div>

    <div id="sistema-modal-overlay">
        <div id="sistema-modal">
            <div id="modal-titulo">Aviso</div>
            <p id="modal-mensagem"></p>
            <input type="text" id="modal-input" autocomplete="off">
            <div class="modal-botoes">
                <button id="modal-btn-cancelar" class="btn-secundario">Cancelar</button>
                <button id="modal-btn-confirmar" class="btn-primario">Confirmar</button>
            </div>
        </div>
    </div>

    <button id="toggle-saved-btn" onclick="toggleSavedConstellations()" title="Ocultar/Mostrar Histórico">
        👁️
    </button>

    <div id="controls-panel">
        <div id="onboarding-msg">Clica nas estrelas para traçar o esqueleto</div>
        <div id="hud">Estrelas Unidas: <span id="star-count">0</span></div>
        <div class="action-buttons">
            <button id="forge-btn" onclick="onForgeConstellation()">Gerar Mito</button>
            <div class="secondary-buttons">
                <button id="undo-btn" onclick="onUndo()" disabled>Desfazer</button>
                <button id="clear-btn" onclick="onClearSky()">Limpar</button>
            </div>
        </div>
        <div class="zoom-container">
            <div class="zoom-label">
                <span>Lente Lume</span>
                <span id="zoom-val">100%</span>
            </div>
            <input type="range" id="zoom-slider" min="0.1" max="8.0" step="0.05" value="0.1">
        </div>
        <div class="library-container">
            <div class="library-header">Biblioteca ▼</div>
            <div id="library-list"></div>
        </div>
    </div>
    
    <div id="tooltip"></div>
    
    <div id="interface-myth">
        <div id="myth-loading">
            <div class="spinner"></div>
            <p id="loading-text"></p>
        </div>
        
        <div id="scroll-container" class="pergaminho-scroll-zone">
            <div class="rolo-topo" id="mesh-rolo-topo"></div>
            
            <div class="pergaminho-corpo" id="mesh-papiro-corpo">
                <button id="close-myth-btn" onclick="closeMythSidebar()">&times;</button>
                
                <div id="myth-content" style="display: none;">
                    <div id="myth-badge"></div>
                    <h2 id="myth-title"></h2>
                    
                    <div class="conteudo-ocultavel" id="bloco-lenda">
                        <div id="myth-text"></div>
                        <div id="myth-metadata"></div>
                    </div>
                </div>
            </div>
            
            <div class="area-base-mecanica">
                <div id="puxador-aviso" onclick="desenrolarPergaminho()">Puxar para ler mito ↓</div>
                <div class="rolo-base" id="mesh-rolo-base" onclick="desenrolarPergaminho()"></div>
            </div>
        </div>
    </div>
    
    <div id="compass">
        <div id="compass-label">Polaris</div>
        <div id="compass-needle"></div>
    </div>

    <button id="save-btn-floating" onclick="onSaveConstellation()" style="display: none;">GUARDAR CONSTELAÇÃO</button>

    <script>
        window.sfx = {
            drone: new Audio('static/audio/drone.mp3'),
            chime: new Audio('static/audio/chime.mp3'),
            ui: new Audio('static/audio/mech.mp3'),
            paper: new Audio('static/audio/paper.mp3')
        };

        window.sfx.drone.loop = true;
        window.sfx.drone.volume = 0.15;
        window.sfx.chime.volume = 0.5;
        window.sfx.ui.volume = 0.3;
        window.sfx.paper.volume = 0.8;

        let audioUnlocked = false;
        window.addEventListener('pointerdown', () => {
            if (!audioUnlocked) {
                window.sfx.drone.play().catch(() => console.warn("Autoplay bloqueado pelo browser"));
                audioUnlocked = true;
            }
        }, { once: true });

        document.addEventListener('click', (e) => {
            if (e.target.tagName.toLowerCase() === 'button' || e.target.closest('button') || e.target.classList.contains('library-item-name')) {
                if (audioUnlocked) {
                    window.sfx.ui.currentTime = 0;
                    window.sfx.ui.play().catch(() => {});
                }
            }
        });

        window.mostrarNotificacao = function(mensagem) {
            const toast = document.getElementById('notificacao-sistema');
            toast.innerText = mensagem;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        window.mostrarModalCustom = function(tipo, mensagem, valorDefeito = "") {
            return new Promise((resolve) => {
                const overlay = document.getElementById('sistema-modal-overlay');
                const titulo = document.getElementById('modal-titulo');
                const msg = document.getElementById('modal-mensagem');
                const input = document.getElementById('modal-input');
                const btnCancelar = document.getElementById('modal-btn-cancelar');
                const btnConfirmar = document.getElementById('modal-btn-confirmar');

                msg.innerText = mensagem;
                if (tipo === 'prompt') {
                    titulo.innerText = 'REGISTAR CONSTELAÇÃO';
                    input.style.display = 'block';
                    input.value = valorDefeito;
                } else if (tipo === 'confirm') {
                    titulo.innerText = 'AVISO DO SISTEMA';
                    input.style.display = 'none';
                    input.value = '';
                }

                overlay.classList.add('show');
                if (tipo === 'prompt') input.focus();

                const newBtnCancelar = btnCancelar.cloneNode(true);
                btnCancelar.parentNode.replaceChild(newBtnCancelar, btnCancelar);
                
                const newBtnConfirmar = btnConfirmar.cloneNode(true);
                btnConfirmar.parentNode.replaceChild(newBtnConfirmar, btnConfirmar);

                newBtnCancelar.addEventListener('click', () => {
                    overlay.classList.remove('show');
                    resolve(null);
                });

                newBtnConfirmar.addEventListener('click', () => {
                    overlay.classList.remove('show');
                    resolve(tipo === 'prompt' ? input.value : true);
                });
            });
        };

        const scrollZone = document.getElementById('scroll-container');
        const papiro = document.getElementById('mesh-papiro-corpo');
        const rTopo = document.getElementById('mesh-rolo-topo');
        const rBase = document.getElementById('mesh-rolo-base');
        const aviso = document.getElementById('puxador-aviso');
        const barraControlos = document.getElementById('controls-panel');

        function desenrolarPergaminho() {
            if (!papiro.classList.contains('aberto')) {
                papiro.classList.add('aberto');
                
                if (window.sfx) {
                    window.sfx.paper.currentTime = 0;
                    window.sfx.paper.play().catch(() => {});
                }

                if (aviso) {
                    aviso.style.opacity = '0';
                    aviso.style.visibility = 'hidden';
                }
                rTopo.style.transform = 'rotateX(720deg)';
                rBase.style.transform = 'rotateX(720deg)';
                setTimeout(() => { sincronizarRotacaoMecanica(); }, 800);
            }
        }

        function sincronizarRotacaoMecanica() {
            if (!scrollZone || !rTopo || !rBase || !papiro.classList.contains('aberto')) return;
            const st = scrollZone.scrollTop;
            const degrees = (st * 1.35) % 360;
            rTopo.style.transform = `rotateX(${degrees}deg)`;
            rBase.style.transform = `rotateX(${degrees}deg)`;
        }

        if (scrollZone) {
            scrollZone.addEventListener('scroll', sincronizarRotacaoMecanica);
        }

        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'class') {
                    const interfaceMyth = document.getElementById('interface-myth');
                    if (interfaceMyth.classList.contains('visible')) {
                        barraControlos.classList.add('shifted');
                    } else {
                        barraControlos.classList.remove('shifted');
                        papiro.classList.remove('aberto');
                        if (aviso) {
                            aviso.style.opacity = '1';
                            aviso.style.visibility = 'visible';
                        }
                        rTopo.style.transform = 'rotateX(0deg)';
                        rBase.style.transform = 'rotateX(0deg)';
                        if (scrollZone) scrollZone.scrollTop = 0;
                    }
                }
            });
        });
        
        const interfaceMythEl = document.getElementById('interface-myth');
        if (interfaceMythEl) { observer.observe(interfaceMythEl, { attributes: true }); }
    </script>

    <script async src="https://cdnjs.cloudflare.com/ajax/libs/es-module-shims/1.6.3/es-module-shims.js"></script>
    <script type="importmap"> { "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js", "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/" } } </script>
    <script type="module" src="static/js/constellation.js"></script>
</body>
</html>
