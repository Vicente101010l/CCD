<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Criação de Constelações</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Roboto+Mono:wght@300;400&display=swap');

        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Roboto Mono', monospace; 
            -webkit-font-smoothing: antialiased;
        }
        canvas { display: block; cursor: crosshair; }
        
        /* Painel Esquerdo com Efeito Vinheta / Degradê */
        #left-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 460px;
            height: 100%;
            background: linear-gradient(to right, rgba(5, 5, 8, 0.95) 0%, rgba(5, 5, 8, 0.8) 50%, rgba(5, 5, 8, 0.35) 85%, rgba(5, 5, 8, 0) 100%);
            color: #ffffff;
            padding: 60px 45px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow-y: auto;
            pointer-events: auto;
        }
        
        /* Ocultar scrollbar padrão e estilizar uma fina e escura */
        #left-panel::-webkit-scrollbar {
            width: 4px;
        }
        #left-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        #left-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        #left-panel::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        
        #app-title {
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 25px;
            font-weight: 400;
            text-transform: uppercase;
        }
        
        #controls-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        #hud { 
            font-size: 11px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
        }
        
        #forge-btn {
            align-self: flex-start;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.9);
            padding: 12px 24px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 2px;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }
        #forge-btn:hover { 
            background: rgba(255, 255, 255, 0.08); 
            border-color: #ffffff;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
        }
        #forge-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: transparent;
            box-shadow: none;
        }
        
        /* Divisor Estilo Fio de Cabelo */
        .sidebar-divider {
            height: 1px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 80%, rgba(255, 255, 255, 0) 100%);
            margin: 35px 0;
            border: none;
        }
        
        /* Interface do Mito e Lenda (Serif) */
        #interface-myth {
            display: none;
            flex-direction: column;
            position: relative;
        }
        #interface-myth.visible {
            display: flex;
        }
        
        #close-myth-btn {
            position: absolute;
            top: -15px;
            right: 0;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            line-height: 1;
            padding: 5px;
        }
        #close-myth-btn:hover {
            color: #ffffff;
            transform: scale(1.1);
        }
        
        #myth-badge {
            align-self: flex-start;
            padding: 3px 8px;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            border-radius: 2px;
        }
        .badge-real {
            background: rgba(168, 196, 224, 0.1);
            color: #a8c4e0;
            border: 1px solid rgba(168, 196, 224, 0.3);
        }
        .badge-custom {
            background: rgba(201, 168, 76, 0.1);
            color: #c9a84c;
            border: 1px solid rgba(201, 168, 76, 0.3);
        }
        
        #myth-title { 
            font-family: 'Lora', Georgia, serif;
            color: #ffffff; 
            text-transform: none; 
            letter-spacing: 0.5px; 
            margin: 0 0 20px 0; 
            font-size: 28px;
            font-weight: 400;
            line-height: 1.3;
        }
        #myth-text {
            font-family: 'Lora', Georgia, serif;
            font-size: 13.5px;
            line-height: 2.0;
            color: rgba(255, 255, 255, 0.75);
            text-align: justify;
            margin: 0;
            white-space: pre-line;
        }
        
        /* Loading Spinner */
        #myth-loading {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
        }
        #myth-loading p {
            font-size: 10px;
            letter-spacing: 2px;
            margin-top: 25px;
            line-height: 1.8;
            text-transform: uppercase;
            animation: pulse 1.8s infinite ease-in-out;
            color: rgba(255, 255, 255, 0.4);
        }
        .spinner {
            width: 35px;
            height: 35px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border-top-color: rgba(255, 255, 255, 0.6);
            animation: spin 0.8s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
        }
        
        /* Tooltip Premium */
        #tooltip {
            position: absolute;
            display: none;
            background: rgba(0, 0, 0, 0.95);
            color: rgba(255, 255, 255, 0.85);
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            font-size: 10px;
            font-weight: bold;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
            transform: translate(-50%, -100%);
            margin-top: -15px;
            z-index: 100;
            letter-spacing: 0.5px;
        }
        
        /* Slider de Zoom Vertical (Estilo 100,000 Stars) */
        #zoom-container {
            position: absolute;
            right: 45px;
            top: 80px;
            height: calc(100% - 160px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
            pointer-events: auto;
        }
        .zoom-label {
            color: rgba(255, 255, 255, 0.35);
            font-family: inherit;
            font-size: 16px;
            font-weight: 300;
            user-select: none;
            cursor: pointer;
            transition: color 0.2s;
        }
        .zoom-label:hover {
            color: #ffffff;
        }
        #zoom-slider-wrapper {
            position: relative;
            height: calc(100% - 60px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Linha guia vertical atrás do slider */
        #zoom-line {
            position: absolute;
            width: 1px;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }
        #zoom-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 30px;
            height: 100%;
            background: transparent;
            outline: none;
            cursor: pointer;
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
        }
        #zoom-slider::-webkit-slider-runnable-track {
            background: transparent;
            width: 30px;
        }
        #zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            transition: transform 0.1s;
        }
        #zoom-slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }
        #zoom-slider::-moz-range-track {
            background: transparent;
            width: 30px;
        }
        #zoom-slider::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            transition: transform 0.1s;
        }
        #zoom-slider::-moz-range-thumb:hover {
            transform: scale(1.3);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Painel Esquerdo Integrado -->
    <div id="left-panel">
        <div id="app-title">PROJETO CONSTELAÇÃO CO-CRIATIVA</div>
        
        <!-- Painel de Controlo / HUD -->
        <div id="controls-panel">
            <div id="hud">MODO: OBSERVAÇÃO/DESENHO<br>ESTRELAS SELECIONADAS: <span id="star-count">0</span></div>
            <button id="forge-btn" onclick="onForgeConstellation()">GERAR MITO</button>
        </div>
        
        <hr class="sidebar-divider" id="myth-divider" style="display: none;">
        
        <!-- Loading Spinner -->
        <div id="myth-loading">
            <div class="spinner"></div>
            <p>A consultar os antigos<br>registos estelares...</p>
        </div>
        
        <!-- Interface do Mito -->
        <div id="interface-myth">
            <button id="close-myth-btn" onclick="closeMythSidebar()">&times;</button>
            <div id="myth-badge"></div>
            <h2 id="myth-title"></h2>
            <p id="myth-text"></p>
        </div>
    </div>
    
    <!-- Tooltip -->
    <div id="tooltip"></div>
    
    <!-- Controlo de Zoom Vertical (Estilo 100,000 Stars) -->
    <div id="zoom-container">
        <div class="zoom-label" id="zoom-in-btn">+</div>
        <div id="zoom-slider-wrapper">
            <div id="zoom-line"></div>
            <input type="range" id="zoom-slider" min="0.1" max="10" step="0.05" value="0.1">
        </div>
        <div class="zoom-label" id="zoom-out-btn">-</div>
    </div>

    <!-- Scripts -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.154.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/" } } </script>
    <script type="module" src="static/js/constellation.js"></script>
</body>
</html>
