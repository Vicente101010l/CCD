<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Criação de Constelações</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; cursor: crosshair; }
        
        #controls-panel {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 6px;
            border: 1px solid rgba(168, 196, 224, 0.25);
            color: #c9a84c;
            z-index: 5;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            width: 250px;
        }
        
        #hud { 
            font-size: 11px;
            line-height: 1.6;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        
        #forge-btn {
            width: 100%;
            padding: 12px 20px;
            background: #c9a84c; 
            border: none; 
            font-weight: bold; 
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #000;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #forge-btn:hover { 
            background: #a8c4e0; 
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(168, 196, 224, 0.4);
        }
        #forge-btn:active {
            transform: translateY(0);
        }
        
        #interface-myth {
            position: absolute; 
            top: 0; 
            right: 0; 
            width: 420px; 
            height: 100%;
            background: rgba(10, 10, 15, 0.85); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white; 
            padding: 50px 30px;
            box-sizing: border-box;
            border-left: 1px solid rgba(168, 196, 224, 0.15); 
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
            overflow-y: auto;
            box-shadow: -10px 0 35px rgba(0, 0, 0, 0.6);
        }
        #interface-myth.visible { 
            transform: translateX(0); 
        }
        
        #close-myth-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 32px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            line-height: 1;
        }
        #close-myth-btn:hover {
            color: #c9a84c;
            transform: scale(1.1);
        }
        
        #myth-badge {
            align-self: flex-start;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            border-radius: 2px;
            font-family: inherit;
        }
        .badge-real {
            background: rgba(168, 196, 224, 0.15);
            color: #a8c4e0;
            border: 1px solid #a8c4e0;
        }
        .badge-custom {
            background: rgba(201, 168, 76, 0.15);
            color: #c9a84c;
            border: 1px solid #c9a84c;
        }
        
        #myth-title { 
            color: #a8c4e0; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-top: 5px; 
            font-size: 20px;
            border-bottom: 1px solid rgba(168, 196, 224, 0.2);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        #myth-text {
            font-size: 13px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.85);
            text-align: justify;
            margin: 0;
            white-space: pre-line;
        }
        
        #tooltip {
            position: absolute;
            display: none;
            background: rgba(0, 0, 0, 0.9);
            color: #a8c4e0;
            padding: 8px 12px;
            border: 1px solid rgba(168, 196, 224, 0.4);
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transform: translate(-50%, -100%);
            margin-top: -15px;
            z-index: 100;
        }
        #myth-loading {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80%;
            color: #a8c4e0;
            text-align: center;
            font-family: inherit;
        }
        #myth-loading p {
            font-size: 11px;
            letter-spacing: 1px;
            margin-top: 25px;
            line-height: 1.6;
            text-transform: uppercase;
            animation: pulse 1.8s infinite ease-in-out;
            color: #c9a84c;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 2px solid rgba(168, 196, 224, 0.1);
            border-radius: 50%;
            border-top-color: #c9a84c;
            animation: spin 0.8s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.2);
        }
        #myth-content {
            display: block;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="controls-panel">
        <div id="hud">MODO: OBSERVAÇÃO/DESENHO<br>ESTRELAS SELECIONADAS: <span id="star-count">0</span></div>
        <button id="forge-btn" onclick="onForgeConstellation()">GERAR MITO</button>
    </div>
    <div id="tooltip"></div>
    <div id="interface-myth">
        <button id="close-myth-btn" onclick="closeMythSidebar()">&times;</button>
        <div id="myth-loading">
            <div class="spinner"></div>
            <p>A consultar os antigos<br>registos estelares...</p>
        </div>
        <div id="myth-content">
            <div id="myth-badge"></div>
            <h2 id="myth-title"></h2>
            <p id="myth-text"></p>
        </div>
    </div>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.154.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/" } } </script>
    <script type="module" src="static/js/constellation.js"></script>
</body>
</html>
